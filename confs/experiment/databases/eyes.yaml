_target_: CMC_utils.datasets.ClassificationDataset # DO NOT CHANGE
_convert_: all # DO NOT CHANGE

name: eyes # Name of the dataset
db_type: tabular # DO NOT CHANGE
classes: [0, 1, 2, 3] # List of the classes (4 classes for eye disease classification)
label_type: multiclass # multiclass classification

task: classification # DO NOT CHANGE

path: ${data_path}/tabular/classification/eyes/eyes.csv # Relative path to the file

columns: # Dictionary containing features names as keys and their types as values # DO NOT REMOVE
  gender:        category
  age:           int
  race:          category
  wt:            int
  height:        float
  weight:        float
  bmi:           float
  waist:         float
  WWI:           float
  WHtR:          float
  TyG:           float
  TyGWHtR:       float
  TyGWC:         float
  TyGBMI:        float
  LBXWBCSI:      float
  LBDNENO:       float
  LBDLYMNO:      float
  LBDMONO:       float
  LBXPLTSI:      float
  PLR:           float
  NLR:           float
  MHR:           float
  SER:           int
  SEL:           int
  VIXORSM:       float
  VIXORCM:       float
  VIXOLSM:       float
  VIXOLCM:       float
  VIXKRD1:       float
  VIXKRD2:       float
  VIXKRDM:       float
  VIXKLD1:       float
  VIXKLD2:       float
  VIXKLDM:       float
  # Other features to be inserted
  label:         target  # DO NOT CHANGE THE VALUE, NAME CORRECTLY THE TARGET VARIABLE

pandas_load_kwargs:
  na_values: ['', 'nan', 'NaN', 'NULL', 'null']
  header: 0

dataset_class: # DO NOT CHANGE
  _target_: CMC_utils.datasets.SupervisedTabularDatasetTorch # DO NOT CHANGE
  _convert_: all # DO NOT CHANGE 