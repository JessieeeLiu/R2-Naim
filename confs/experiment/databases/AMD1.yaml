# AMD1数据集配置
# 二分类任务：年龄相关性黄斑变性(AMD)预测

_target_: CMC_utils.datasets.ClassificationDataset # DO NOT CHANGE
_convert_: all # DO NOT CHANGE

name: AMD1 # Name of the dataset
db_type: tabular # DO NOT CHANGE
classes: [ 0, 1 ] # List of the classes (0: 正常, 1: AMD)
label_type: multiclass # multiclass or binary

task: classification # DO NOT CHANGE

path: ${data_path}/tabular/classification/eyes/AMD1.csv # Relative path to the file

columns: # Dictionary containing features names as keys and their types as values # DO NOT REMOVE
  FINAL_WEIGHT:      int
  gender:            category
  age:               int
  race:              category
  Educational Level: category
  LBXWBCSI:          float
  LBXPLTSI:          int
  LBDNENO:           float
  LBDLYMNO:          float
  LBDMONO:           float
  LBXMCVSI:          float
  LBXMCHSI:          float
  BMXWAIST:          float
  BMXWT:             float
  BMXHT:             float
  BMXBMI:            float
  WWI:               float
  WHtR:              float
  PLR:               float
  NLR:               float
  MHR:               float
  SII:               float
  SIRI:              float
  PIV:               float
  # Other features to be inserted
  Label:             target  # DO NOT CHANGE THE VALUE, NAME CORRECTLY THE TARGET VARIABLE

pandas_load_kwargs:
  na_values: []
  header: 0

dataset_class: # DO NOT CHANGE
  _target_: CMC_utils.datasets.SupervisedTabularDatasetTorch # DO NOT CHANGE
  _convert_: all # DO NOT CHANGE 